<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindTrack | Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --accent-blue: #38bdf8;
            --accent-purple: #a855f7;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: white;
            margin: 0;
            display: flex;
            height: 100vh;
        }

        /* Sidebar inspired by your Figma link */
        .sidebar {
            width: 250px;
            background: rgba(30, 41, 59, 0.5);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
        }

        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            color: white;
            padding: 15px;
            font-size: 16px;
            resize: none;
        }

        button {
            background: linear-gradient(to right, var(--accent-blue), var(--accent-purple));
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        button:hover { transform: scale(1.02); box-shadow: 0 0 15px rgba(56, 189, 248, 0.4); }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        .trigger-tag {
            display: inline-block;
            background: rgba(168, 85, 247, 0.2);
            border: 1px solid var(--accent-purple);
            padding: 5px 12px;
            border-radius: 20px;
            margin: 5px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>MindTrack</h2>
    <p style="color: #94a3b8;">Welcome, {{ username }}</p>
    <hr style="opacity: 0.1">
    <a href="/logout" style="color: #f87171; text-decoration: none;">Logout</a>
</div>

<div class="main-content">
    <div class="glass-card">
        <h3>How are you feeling?</h3>
        <p>AI will analyze your text for emotions and behavior triggers.</p>
        <textarea id="journalText" rows="4" placeholder="Type your thoughts here..."></textarea>
        <button onclick="analyzeEntry()">Analyze & Save</button>
    </div>

    <div class="stats-grid">
        <div class="glass-card">
            <h4>Detected Emotion</h4>
            <h1 id="moodDisplay" style="color: var(--accent-blue);">---</h1>
        </div>

        <div class="glass-card">
            <h4>Identified Triggers (The "Why")</h4>
            <div id="triggerContainer">Enter text to see triggers...</div>
        </div>
    </div>

    <div class="glass-card">
        <h4>Mood Trends Over Time</h4>
        <canvas id="moodChart" height="100"></canvas>
    </div>
</div>

<script>
async function analyzeEntry() {
    const text = document.getElementById('journalText').value;
    if(!text) return alert("Write something first!");

    const response = await fetch('/analyze', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ text: text })
    });

    const result = await response.json();
    
    // UI Update (Fulfilling real-time feedback objective)
    document.getElementById('moodDisplay').innerText = result.emotion.toUpperCase();
    
    const triggerDiv = document.getElementById('triggerContainer');
    triggerDiv.innerHTML = "";
    result.reasons.forEach(reason => {
        triggerDiv.innerHTML += `<span class="trigger-tag">${reason}</span>`;
    });

    alert("Analysis Saved to Database!");
}

// Chart.js placeholder for Mood Trend
const ctx = document.getElementById('moodChart').getContext('2d');
new Chart(ctx, {
    type: 'line',
    data: {
        labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
        datasets: [{
            label: 'Wellness Score',
            data: [65, 59, 80, 81, 56, 55, 40],
            borderColor: '#38bdf8',
            tension: 0.4,
            fill: true,
            backgroundColor: 'rgba(56, 189, 248, 0.1)'
        }]
    },
    options: { plugins: { legend: { display: false } } }
});
</script>

</body>
</html>
